<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F6F5F2">
  <title>Fitness Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <style>
    /* ── Tokens ──────────────────────────────────────────── */
    :root {
      --bg:          #F6F5F2;
      --surface:     #FFFFFF;
      --accent:      #D4511F;
      --accent-dim:  #FEF4EE;
      --accent-text: #9A3412;
      --text:        #1C1917;
      --muted:       #78716C;
      --subtle:      #A8A29E;
      --border:      #E7E5E4;
      --border-soft: #F5F5F4;
      --green:       #16A34A;
      --green-dim:   #DCFCE7;
      --amber:       #D97706;
      --amber-dim:   #FEF3C7;
      --red:         #DC2626;
      --red-dim:     #FEE2E2;
      --blue:        #2563EB;
      --blue-dim:    #DBEAFE;

      --ease-out:    cubic-bezier(0.23, 1, 0.32, 1);
      --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

      --r-card: 20px;
      --r-btn:  14px;
      --r-inp:  12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.04);
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-feature-settings: "cv01";
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
      color: var(--text);
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    /* ── App shell ───────────────────────────────────────── */
    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100svh;
      position: relative;
    }

    /* ── Screens ─────────────────────────────────────────── */
    .screen { display: none; padding-bottom: 100px; }
    .screen.active { display: block; }

    .screen-hdr {
      position: sticky; top: 0; z-index: 50;
      padding: 52px 20px 14px;
      background: rgba(246,245,242,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .screen-hdr h1 {
      font-size: 26px; font-weight: 800;
      letter-spacing: -0.5px; color: var(--text);
    }
    .screen-hdr p { font-size: 13px; color: var(--muted); margin-top: 1px; }
    .content { padding: 16px 16px 0; }

    /* ── Bottom nav (floating pill) ──────────────────────── */
    .nav {
      position: fixed;
      bottom: max(18px, env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%);
      width: calc(100% - 32px); max-width: 390px;
      background: rgba(28,25,23,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 22px;
      display: flex; padding: 7px; gap: 2px;
      z-index: 100;
      box-shadow: 0 8px 40px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.1),
                  inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 4px 7px; gap: 3px;
      border: none; background: none; cursor: pointer;
      border-radius: 15px;
      transition: background 220ms var(--ease-out), transform 160ms var(--ease-out);
    }
    .nav-btn:active { transform: scale(0.93); }
    .nav-btn.active { background: rgba(255,255,255,0.1); }
    .nav-btn svg {
      width: 20px; height: 20px; fill: none;
      stroke: rgba(255,255,255,0.38); stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      transition: stroke 220ms var(--ease-out);
    }
    .nav-btn.active svg { stroke: rgba(255,255,255,0.96); }
    .nav-btn span {
      font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.38);
      transition: color 220ms var(--ease-out);
    }
    .nav-btn.active span { color: rgba(255,255,255,0.96); }

    /* ── Cards ───────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--r-card);
      padding: 18px;
      margin-bottom: 12px;
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: var(--shadow);
    }
    .card-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--subtle); margin-bottom: 12px;
    }
    .card-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 16px; font-weight: 700; color: var(--text);
    }

    /* ── Section title ───────────────────────────────────── */
    .section-title {
      font-size: 16px; font-weight: 700; color: var(--text);
      margin: 20px 0 10px;
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; padding: 14px 20px;
      border-radius: var(--r-btn); font-family: 'Outfit', sans-serif;
      font-weight: 600; font-size: 15px; border: none;
      cursor: pointer; width: 100%;
      transition: transform 160ms var(--ease-out), opacity 160ms;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-surface { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost   { background: var(--accent-dim); color: var(--accent); }
    .btn-danger  { background: var(--red-dim); color: var(--red); }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }

    /* ── Inputs ──────────────────────────────────────────── */
    label.lbl {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--muted); margin: 16px 0 6px;
    }
    .inp {
      width: 100%; padding: 13px 14px;
      border: 1.5px solid var(--border); border-radius: var(--r-inp);
      font-family: 'Outfit', sans-serif; font-size: 15px; color: var(--text);
      background: var(--bg); outline: none;
      transition: border-color 180ms var(--ease-out), box-shadow 180ms var(--ease-out);
    }
    .inp:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212,81,31,0.1);
    }
    textarea.inp { min-height: 72px; resize: none; }

    /* ── Chip selector ───────────────────────────────────── */
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      flex: 1; min-width: 0; padding: 10px 8px;
      border-radius: 11px; background: var(--border-soft);
      border: 1.5px solid var(--border); cursor: pointer;
      font-family: 'Outfit', sans-serif; font-size: 13px;
      font-weight: 600; color: var(--muted); text-align: center;
      transition: all 200ms var(--ease-out);
    }
    .chip:active { transform: scale(0.96); }
    .chip.on { border-color: transparent; color: white; }

    /* ── Nutrition hero ──────────────────────────────────── */
    .cal-hero {
      display: flex; align-items: baseline; gap: 6px; margin-bottom: 16px;
    }
    .cal-num {
      font-size: 52px; font-weight: 800; letter-spacing: -2px;
      color: var(--text); line-height: 1;
    }
    .cal-unit { font-size: 18px; font-weight: 600; color: var(--muted); }
    .macro-strip {
      display: grid; grid-template-columns: repeat(3,1fr);
      background: var(--bg); border-radius: 14px;
      overflow: hidden; border: 1px solid var(--border);
    }
    .macro-cell {
      padding: 12px 10px; text-align: center;
    }
    .macro-cell + .macro-cell { border-left: 1px solid var(--border); }
    .macro-val { font-size: 18px; font-weight: 700; display: block; }
    .macro-key { font-size: 11px; font-weight: 600; color: var(--subtle); margin-top: 2px; display: block; }

    /* ── Food entries ────────────────────────────────────── */
    .entry {
      background: var(--surface);
      border-radius: var(--r-card); margin-bottom: 10px;
      display: flex; align-items: flex-start;
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: slide-up 280ms var(--ease-out) both;
    }
    .entry:nth-child(1) { animation-delay:  0ms }
    .entry:nth-child(2) { animation-delay: 40ms }
    .entry:nth-child(3) { animation-delay: 80ms }
    .entry:nth-child(4) { animation-delay:120ms }
    .entry:nth-child(5) { animation-delay:160ms }
    .entry:nth-child(n+6){ animation-delay:200ms }

    .entry-body { flex:1; padding: 14px 0 14px 16px; min-width: 0; }
    .entry-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .entry-time  { font-size: 12px; color: var(--subtle); margin-top: 2px; }
    .pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .pill {
      background: var(--accent-dim); color: var(--accent-text);
      font-size: 11px; font-weight: 600;
      padding: 3px 8px; border-radius: 20px;
    }
    .del-btn {
      background: none; border: none; cursor: pointer;
      color: var(--subtle); padding: 14px 14px;
      align-self: center; flex-shrink: 0;
      transition: color 160ms, transform 160ms var(--ease-out);
    }
    .del-btn:active { transform: scale(0.9); color: var(--red); }

    /* ── Training entries ────────────────────────────────── */
    .t-entry {
      background: var(--surface);
      border-radius: var(--r-card); padding: 16px;
      margin-bottom: 10px;
      display: flex; align-items: flex-start; gap: 14px;
      border: 1px solid rgba(0,0,0,0.05);
      border-left-width: 3px;
      box-shadow: var(--shadow);
      animation: slide-up 280ms var(--ease-out) both;
    }
    .t-entry:nth-child(1) { animation-delay:  0ms }
    .t-entry:nth-child(2) { animation-delay: 40ms }
    .t-entry:nth-child(3) { animation-delay: 80ms }
    .t-type-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .t-type-icon svg { width: 18px; height: 18px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .t-info { flex: 1; min-width: 0; }
    .t-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .t-detail { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .t-note { font-size: 12px; color: var(--subtle); margin-top: 4px; font-style: italic; }

    /* ── Sleep stats ─────────────────────────────────────── */
    .sleep-stats {
      display: grid; grid-template-columns: repeat(3,1fr);
      margin-bottom: 14px; gap: 0;
    }
    .sleep-stat { text-align: center; padding: 8px 4px; }
    .sleep-stat + .sleep-stat { border-left: 1px solid var(--border); }
    .sleep-val { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
    .sleep-lbl { font-size: 11px; font-weight: 600; color: var(--subtle); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
    .quality-badge {
      border-radius: 12px; padding: 10px 14px;
      text-align: center; font-size: 14px; font-weight: 600;
    }

    /* ── Quality buttons ─────────────────────────────────── */
    .q-row { display: flex; gap: 8px; }
    .q-btn {
      flex: 1; height: 48px; border-radius: 11px;
      background: var(--border-soft); border: 1.5px solid var(--border);
      font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 700;
      color: var(--muted); cursor: pointer;
      transition: all 200ms var(--ease-out);
    }
    .q-btn:active { transform: scale(0.95); }
    .q-btn.on { color: white; border-color: transparent; }
    .q-label { text-align: center; font-size: 13px; color: var(--subtle); margin-top: 6px; }

    /* ── Duration preview ────────────────────────────────── */
    .dur-preview {
      display: flex; align-items: center; gap: 8px;
      background: var(--accent-dim); border-radius: 10px;
      padding: 10px 14px; margin-top: 8px;
      font-size: 14px; font-weight: 600; color: var(--accent);
      animation: fade-in 200ms var(--ease-out);
    }
    .dur-preview svg { width: 16px; height: 16px; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }

    /* ── Exercise builder ────────────────────────────────── */
    .ex-block {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px; margin-bottom: 10px;
    }
    .ex-hdr { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .set-header { display: grid; grid-template-columns: 28px 1fr 1fr; gap: 6px; margin-bottom: 6px; }
    .set-header span { font-size: 11px; font-weight: 700; color: var(--subtle); text-align: center; text-transform: uppercase; letter-spacing: 0.06em; }
    .set-row { display: grid; grid-template-columns: 28px 1fr 1fr; gap: 6px; align-items: center; margin-bottom: 6px; }
    .set-num { font-size: 12px; color: var(--subtle); font-weight: 700; text-align: center; }
    .set-inp {
      padding: 9px; border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Outfit', sans-serif; font-size: 14px;
      font-weight: 600; text-align: center; width: 100%;
      background: var(--surface); color: var(--text); outline: none;
      transition: border-color 180ms;
    }
    .set-inp:focus { border-color: var(--accent); }
    .add-set-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'Outfit', sans-serif; font-size: 13px;
      font-weight: 600; color: var(--accent); padding: 4px 0;
    }
    .rm-ex-btn {
      background: var(--red-dim); border: none; cursor: pointer;
      width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--red);
      transition: transform 160ms var(--ease-out);
    }
    .rm-ex-btn:active { transform: scale(0.9); }
    .add-ex-btn {
      width: 100%; padding: 13px; border: 1.5px dashed var(--border);
      border-radius: 12px; background: none; cursor: pointer;
      font-family: 'Outfit', sans-serif; font-size: 14px;
      font-weight: 600; color: var(--muted); margin-top: 4px;
      transition: border-color 180ms, color 180ms;
    }
    .add-ex-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── History rows ────────────────────────────────────── */
    .h-row {
      background: var(--surface); border-radius: 14px;
      padding: 14px 16px; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
      border: 1px solid rgba(0,0,0,0.05);
      animation: slide-up 280ms var(--ease-out) both;
    }
    .h-row:nth-child(1) { animation-delay:  0ms }
    .h-row:nth-child(2) { animation-delay: 40ms }
    .h-row:nth-child(3) { animation-delay: 80ms }
    .h-date { font-size: 14px; font-weight: 600; color: var(--text); }
    .h-time { font-size: 12px; color: var(--subtle); margin-top: 2px; }
    .h-right { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .h-dur  { font-size: 20px; font-weight: 800; color: var(--text); }
    .q-dot  { width: 10px; height: 10px; border-radius: 50%; }

    /* ── Bottom sheet modal ──────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(28,25,23,0.4);
      z-index: 200; display: none;
      opacity: 0; transition: opacity 300ms var(--ease-out);
    }
    .overlay.open { display: block; opacity: 1; }
    .modal {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 430px;
      background: var(--bg); border-radius: 24px 24px 0 0;
      z-index: 201; max-height: 92svh; overflow-y: auto;
      transition: transform 380ms var(--ease-drawer);
    }
    .overlay.open .modal { transform: translateX(-50%) translateY(0); }
    .modal-hdr {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 18px 14px;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .modal-hdr h2 { font-size: 17px; font-weight: 700; color: var(--text); }
    .modal-close {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--border-soft); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: background 160ms, transform 160ms var(--ease-out);
    }
    .modal-close:active { transform: scale(0.9); }
    .modal-body { padding: 18px 18px 48px; }

    /* ── Advice box ──────────────────────────────────────── */
    .advice-box {
      background: var(--surface);
      border-radius: 16px; padding: 16px;
      border-left: 3px solid var(--accent);
      border: 1px solid var(--border);
      border-left-color: var(--accent);
      border-left-width: 3px;
    }
    .advice-box p { font-size: 14px; color: var(--text); line-height: 1.7; white-space: pre-wrap; }
    .refresh-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: none; border: none; cursor: pointer;
      color: var(--accent); font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 600; margin-top: 12px;
      transition: opacity 160ms;
    }
    .refresh-btn:active { opacity: 0.6; }
    .refresh-btn svg { width: 14px; height: 14px; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; }

    /* ── Empty states ────────────────────────────────────── */
    .empty { padding: 48px 16px; text-align: center; }
    .empty-ring {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--border-soft); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .empty-ring svg { width: 28px; height: 28px; stroke: var(--subtle); stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .empty h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .empty p  { font-size: 14px; color: var(--muted); }

    /* ── Loading skeleton ────────────────────────────────── */
    .loader { position: fixed; inset: 0; background: var(--bg); z-index: 300; display: none; padding: 80px 20px 0; }
    .loader.show { display: block; }
    .sk {
      border-radius: 12px;
      background: linear-gradient(90deg, var(--border) 0%, var(--border-soft) 50%, var(--border) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
    }
    .sk-card { height: 120px; border-radius: var(--r-card); margin-bottom: 12px; }
    .sk-line { height: 16px; border-radius: 8px; margin-bottom: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }

    /* ── Loader message ──────────────────────────────────── */
    .loader-inner {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%;
      padding-bottom: 80px;
    }
    .loader-ring {
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 0.7s linear infinite;
      margin-bottom: 16px;
    }
    .loader-msg { font-size: 15px; font-weight: 600; color: var(--muted); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Settings rows ───────────────────────────────────── */
    .s-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 13px 0; border-bottom: 1px solid var(--border-soft);
      font-size: 14px;
    }
    .s-row:last-child { border-bottom: none; }
    .s-row span:first-child { color: var(--muted); }
    .s-row span:last-child  { font-weight: 700; color: var(--text); }

    /* ── Dashboard training chip ─────────────────────────── */
    .t-chip {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 12px; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      margin-bottom: 6px; border: 1.5px solid;
    }
    .t-chip svg { width: 14px; height: 14px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Misc ────────────────────────────────────────────── */
    .hint { font-size: 13px; color: var(--subtle); font-style: italic; text-align: center; padding: 8px 0; }
    .edit-link { background: none; border: none; cursor: pointer; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; color: var(--accent); }
    .warning { background: var(--amber-dim); border: 1px solid #F59E0B; border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; color: #92400E; line-height: 1.5; }
    a { color: var(--accent); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }

    /* ── Animations ──────────────────────────────────────── */
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }

// ═══════════════════════════════════════════════════════
//  GOOGLE FIT — SLAAP IMPORT
// ═══════════════════════════════════════════════════════
async function importFitSleep() {
  // Token verlopen of nog niet aanwezig → stil opnieuw inloggen
  if (!_gToken) {
    toast('Toegang vernieuwen…');
    try {
      const result = await fbAuth.signInWithPopup(_googleProvider);
      _gToken = result.credential.accessToken;
      RENDERS.settings();
    } catch {
      toast('Inloggen mislukt — probeer opnieuw');
      return;
    }
  }

  const now     = Date.now();
  const weekAgo = now - 14 * 24 * 60 * 60 * 1000;

  try {
    const res = await fetch(
      `https://www.googleapis.com/fitness/v1/users/me/sessions` +
      `?activityType=72&startTime=${new Date(weekAgo).toISOString()}&endTime=${new Date(now).toISOString()}`,
      { headers: { 'Authorization': `Bearer ${_gToken}` } }
    );

    if (res.status === 401) {
      _gToken = null;
      RENDERS.settings();
      toast('Toegang verlopen — tik nogmaals om opnieuw in te loggen');
      return;
    }
    if (res.status === 403) {
      const body = await res.json().catch(() => ({}));
      const msg  = body?.error?.message || '';
      if (msg.includes('disabled')) {
        toast('Fitness API niet ingeschakeld in Google Cloud');
      } else {
        toast('Geen toegang — controleer de Fitness API scope');
      }
      return;
    }
    if (!res.ok) {
      toast(`Google Fit fout (${res.status}) — probeer opnieuw`);
      return;
    }

    const data     = await res.json();
    const sessions = data.session || [];
    if (!sessions.length) {
      toast('Geen slaapdata in Google Fit gevonden');
      return;
    }

    const existing      = db.getArr('sleep');
    const existingDates = new Set(existing.map(s => s.date));
    let added = 0;

    for (const s of sessions) {
      const start    = new Date(Number(s.startTimeMillis));
      const end      = new Date(Number(s.endTimeMillis));
      const date     = end.toISOString().slice(0, 10);
      if (existingDates.has(date)) continue;
      const bedtime  = start.toTimeString().slice(0, 5);
      const wakeTime = end.toTimeString().slice(0, 5);
      const duration = Math.round((end - start) / 360000) / 10;
      existing.push({ id: uid(), date, bedtime, wakeTime, duration, quality: 3 });
      existingDates.add(date);
      added++;
    }

    if (added > 0) {
      db.set('sleep', existing.sort((a, b) => b.date.localeCompare(a.date)));
      toast(`${added} slaapnacht${added > 1 ? 'en' : ''} geïmporteerd`);
      RENDERS.sleep();
    } else {
      toast('Alle slaapdata was al aanwezig');
    }
  } catch(e) {
    console.error('Fit import error:', e);
    toast('Verbindingsfout — controleer je internet');
  }
}

function calcDuration(bed, wake) {
  const [bh,bm] = bed.split(':').map(Number);
  const [wh,wm] = wake.split(':').map(Number);
  let b = bh*60+bm, w = wh*60+wm;
  if (w <= b) w += 1440;
  return (w-b)/60;
}
const isTime = t => /^\d{2}:\d{2}$/.test(t);

function resizeImage(file, maxPx=900) {
  return new Promise(resolve => {
    const img = new Image(), url = URL.createObjectURL(file);
    img.onload = () => {
      let {width:w, height:h} = img;
      if (w > h) { if (w>maxPx) { h=h*maxPx/w; w=maxPx; } }
      else        { if (h>maxPx) { w=w*maxPx/h; h=maxPx; } }
      const c = document.createElement('canvas');
      c.width=Math.round(w); c.height=Math.round(h);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg',0.75).split(',')[1]);
    };
    img.src = url;
  });
}

// ═══════════════════════════════════════════════════════
//  GROQ API
// ═══════════════════════════════════════════════════════
async function callGroq(messages) {
  const {apiKey} = db.getObj('settings');
  if (!apiKey) throw new Error('Geen API-key. Ga naar Instellingen.');
  const res = await fetch(GROQ_URL, {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'Authorization': `Bearer ${apiKey}`,
    },
    body: JSON.stringify({model: GROQ_MODEL, messages}),
  });
  if (!res.ok) {
    if (res.status === 429) throw new Error('Limiet bereikt — wacht even en probeer opnieuw');
    if (res.status === 401) throw new Error('API-key ongeldig — controleer je sleutel in Instellingen');
    throw new Error(`Groq fout (${res.status})`);
  }
  return res.json().then(d => d.choices[0].message.content);
}

async function analyzeFood(base64) {
  const text = await callGroq([{
    role: 'user',
    content: [
      {type: 'image_url', image_url: {url: `data:image/jpeg;base64,${base64}`}},
      {type: 'text', text: 'Analyze this food image. Reply with ONLY raw JSON, no markdown:\n{"description":"food name in Dutch","calories":0,"protein":0,"carbs":0,"fat":0}'},
    ],
  }]);
  const m = text.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('Kon voedingsdata niet lezen');
  return JSON.parse(m[0]);
}

const OFF_SEARCH_URL  = 'https://world.openfoodfacts.org/cgi/search.pl';
const OFF_BARCODE_URL = 'https://world.openfoodfacts.org/api/v0/product';

let _dbResults   = [];   // last search results
let _portionProd = null; // product currently being portioned

function normOFF(p) {
  const n = p.nutriments || {};
  const kcal = n['energy-kcal_100g'] ?? (n['energy_100g'] ? n['energy_100g'] / 4.184 : 0);
  return {
    name:         (p.product_name || p.generic_name || '').trim() || 'Onbekend product',
    brand:        (p.brands || '').split(',')[0].trim(),
    per100: {
      calories: Math.round(kcal),
      protein:  Math.round((n.proteins_100g       || 0) * 10) / 10,
      carbs:    Math.round((n.carbohydrates_100g   || 0) * 10) / 10,
      fat:      Math.round((n.fat_100g             || 0) * 10) / 10,
    },
    servingQty:   p.serving_quantity ? parseFloat(p.serving_quantity) : null,
    servingLabel: p.serving_size || null,
  };
}

async function searchOFF(query) {
  const params = new URLSearchParams({
    search_terms: query, search_simple: '1', action: 'process', json: '1',
    fields: 'product_name,generic_name,brands,nutriments,serving_size,serving_quantity',
    page_size: '12', lc: 'nl', cc: 'nl',
  });
  const res  = await fetch(`${OFF_SEARCH_URL}?${params}`);
  const data = await res.json();
  return (data.products || [])
    .filter(p => (p.product_name || p.generic_name) && (p.nutriments?.['energy-kcal_100g'] ?? 0) > 0)
    .slice(0, 8)
    .map(normOFF);
}

async function barcodeToProduct(code) {
  const res  = await fetch(`${OFF_BARCODE_URL}/${code}.json`);
  const data = await res.json();
  if (data.status !== 1 || !data.product) throw new Error('Product niet gevonden in database');
  return normOFF(data.product);
}

// ── Barcode scan (photo → html5-qrcode decode → OFF lookup) ──
async function handleBarcodePhoto(file) {
  if (!file) return;
  if (typeof Html5Qrcode === 'undefined') {
    toast('Barcode-decoder niet geladen, probeer tekst zoeken'); return;
  }
  showLoader('Barcode lezen…');
  try {
    const tmpId = 'barcode-tmp-' + uid();
    const tmp   = document.createElement('div');
    tmp.id = tmpId; tmp.style.display = 'none';
    document.body.appendChild(tmp);

    const reader = new Html5Qrcode(tmpId, { verbose: false });
    let code;
    try {
      code = await reader.scanFile(file, false);
    } finally {
      reader.clear();
      tmp.remove();
    }

    const digits = code.replace(/\D/g, '');
    if (digits.length < 8) throw new Error('Geen geldige barcode herkend');

    const product = await barcodeToProduct(digits);
    _dbResults  = [product];
    _portionProd = product;

    // If search modal is already open, show in results — otherwise open portion picker directly
    const resultsEl = document.getElementById('db-results');
    if (resultsEl) {
      renderDBResults();
    } else {
      openModal(product.name, buildPortionPickerHTML(product));
      updatePortionPreview();
    }
  } catch(e) {
    toast('Fout: ' + e.message);
  } finally {
    hideLoader();
    document.getElementById('inp-barcode').value = '';
  }
}

document.getElementById('inp-barcode').addEventListener('change', e => handleBarcodePhoto(e.target.files[0]));

    btn.style.borderColor   = 'var(--accent)';
    btn.style.color         = 'white';
  }
  updatePortionPreview();
}

function updatePortionPreview() {
  const p = _portionProd; if (!p) return;
  const grams = parseFloat(document.getElementById('portion-g')?.value) || 0;
  const f   = grams / 100;
  const cal = Math.round(p.per100.calories * f);
  const pro = Math.round(p.per100.protein  * f * 10) / 10;
  const car = Math.round(p.per100.carbs    * f * 10) / 10;
  const fat = Math.round(p.per100.fat      * f * 10) / 10;
  const el  = document.getElementById('portion-preview');
  if (el) el.innerHTML = `
    <div class="dur-preview">
      ${IC.sparkle}
      <span>${grams}g — <strong>${cal} kcal</strong> · E ${pro}g K ${car}g V ${fat}g</span>
    </div>`;
}

function backToSearch() {

const _mkEx = () => ({name:'',wgerId:null,muscleStr:'',sets:[{reps:'',weight:''}],_picking:false,_catId:null,_catExercises:[],_loading:false,_filter:'',_sq:'',_sr:[],_sl:false});
let tF = {type:'strength',duration:'',intensity:'medium',enduranceType:'run',distance:'',notes:'',date:todayStr(),exercises:[_mkEx()]};

function renderTEntry(e, i) {
  const m = TYPE_META[e.type];
  const detail = e.type==='strength'
    ? `${e.exercises?.length??0} oefeningen${e.duration?` · ${e.duration} min`:''}`
    : e.type==='motocross' ? `${e.duration??0} min · intensiteit: ${e.intensity}`
    : `${e.enduranceType} · ${e.duration??0} min · ${e.distance??0} km`;
  return `<div class="t-entry" style="border-left-color:${m.color};animation-delay:${i*40}ms">
    <div class="t-type-icon" style="background:${m.bg};stroke:${m.color}">${m.icon}</div>
    <div class="t-info">
      <div class="t-name">${m.label}</div>
      <div class="t-detail">${detail}</div>
      ${e.notes?`<div class="t-note">${e.notes}</div>`:''}
    </div>
    <button class="del-btn" onclick="deleteTraining('${e.id}')">${IC.trash}</button>
  </div>`;
}

RENDERS.training = function renderTraining() {
  const all     = db.getArr('training');
  const today   = todayStr();
  const todayEntries = all.filter(e => (e.date||'').startsWith(today));
  const past     = all.filter(e => !(e.date||'').startsWith(today));

  // Group past entries by date, sorted newest first
  const grouped = {};
  past.forEach(e => {
    const d = e.date || e.timestamp?.slice(0,10) || '?';
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(e);
  });
  const sortedDates = Object.keys(grouped).sort().reverse();

  const fmt = d => new Date(d + 'T12:00:00').toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});

  const emptyHTML = `
    <div class="empty">
      <div class="empty-ring">
        <svg viewBox="0 0 24 24"><line x1="6" y1="5" x2="6" y2="19"/><line x1="18" y1="5" x2="18" y2="19"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="6" y1="7" x2="10" y2="7"/><line x1="6" y1="17" x2="10" y2="17"/><line x1="14" y1="7" x2="18" y2="7"/><line x1="14" y1="17" x2="18" y2="17"/></svg>
      </div>
      <h3>Geen training gelogd</h3>
      <p>Log je eerste sessie van vandaag</p>
    </div>`;

  const historyHTML = sortedDates.map(d => `
    <div class="section-title" style="font-size:14px;color:var(--muted);font-weight:600;margin-top:20px">${fmt(d)}</div>
    ${grouped[d].map((e,i) => renderTEntry(e,i)).join('')}
  `).join('');

  document.getElementById('training-content').innerHTML = `
    <button class="btn btn-primary" style="margin-bottom:20px;animation:slide-up 260ms var(--ease-out)" onclick="openTrainingModal()">
      ${IC.plus} Training loggen
    </button>
    <div class="section-title">Vandaag</div>
    ${todayEntries.length===0 ? emptyHTML : todayEntries.map((e,i) => renderTEntry(e,i)).join('')}
    ${historyHTML}`;
};

function deleteTraining(id) {
  if (!confirm('Verwijder deze training?')) return;
  db.remove('training',id); RENDERS.training();
}

function openTrainingModal() {
  tF = {type:'strength',duration:'',intensity:'medium',enduranceType:'run',distance:'',notes:'',date:todayStr(),exercises:[_mkEx()]};

}

function buildTForm() {
  const typeChips = Object.entries(TYPE_META).map(([key,m]) =>
    `<button class="chip${tF.type===key?' on':''}" style="${tF.type===key?`background:${m.color};border-color:${m.color}`:''}" onclick="setTType('${key}')">${m.label}</button>`
  ).join('');

  let specific = '';
  if (tF.type==='strength') {
    specific = tF.exercises.map((ex,ei) => {
      // ── Exercise picker UI ──
      let pickerHTML = '';
      if (ex._picking) {
        const catChips = WGER_CATS.map(c =>
          `<button class="chip${ex._catId===c.id?' on':''}"
            style="${ex._catId===c.id?'background:var(--accent);border-color:var(--accent);color:white':''}"
            onclick="loadCatExercises(${ei},${c.id})">${c.nl}</button>`
        ).join('');

        let listHTML = '';
        if (ex._loading) {
          listHTML = `<div class="db-msg" style="padding:16px">Laden…</div>`;
        } else if (ex._catExercises.length > 0) {
          const filtered = ex._filter
            ? ex._catExercises.filter(e => e.name.toLowerCase().includes(ex._filter))
            : ex._catExercises;
          listHTML = `
            <input class="inp" style="margin:8px 0 6px;font-size:13px" placeholder="Filteren…"
              value="${ex._filter}"
              oninput="tF.exercises[${ei}]._filter=this.value.toLowerCase();rebuildExList(${ei})">
            <div class="ex-pick-wrap" id="ex-list-${ei}">
              ${filtered.map((e,xi) => `
                <div class="ex-pick-item" onclick="chooseExercise(${ei},${xi})">
                  <div class="ex-pick-name">${e.name}</div>
                  ${e.muscles?`<div class="ex-pick-muscles">${e.muscles}</div>`:''}
                </div>`).join('')}
            </div>`;
        }

        pickerHTML = `
          <div>
            <input class="inp" id="ex-sq-${ei}" placeholder="Zoek oefening op naam…"
              value="${ex._sq}"
              oninput="exSearchInput(${ei}, this.value)"
              style="margin-bottom:4px">
            <div id="ex-sr-${ei}">${
              !ex._sq ? '' :
              ex._sl ? `<div class="db-msg">Zoeken in alle oefeningen…</div>` :
              !ex._sr.length ? `<div class="db-msg">Geen resultaten voor "<b>${ex._sq}</b>"</div>` :
              `<div class="ex-pick-wrap">${ex._sr.map((e,xi)=>`
                <div class="ex-pick-item" onclick="chooseFromSearch(${ei},${xi})">
                  <div class="ex-pick-name">${e.name}</div>
                  ${e.muscles?`<div class="ex-pick-muscles">${e.muscles}</div>`:''}
                </div>`).join('')}</div>`
            }</div>
            ${!ex._sq ? `
            <label class="lbl" style="margin-top:10px">Of blader per categorie</label>
            <div class="chips" style="flex-wrap:wrap">${catChips}</div>
            ${listHTML}` : ''}
            <div style="margin-top:10px;display:flex;gap:6px;align-items:center">
              <input class="inp" id="custom-ex-${ei}" placeholder="Of typ naam zelf…" style="flex:1;font-size:13px">
              <button class="btn btn-ghost" style="width:auto;padding:11px 14px;font-size:13px" onclick="useCustomEx(${ei})">OK</button>
            </div>
          </div>`;
      }

      // ── Header row (selected / picking / empty) ──
      let hdrHTML;
      if (ex.name && !ex._picking) {
        hdrHTML = `
          <div class="ex-selected">
            <div class="ex-selected-name">${ex.name}</div>
            ${ex.muscleStr?`<div class="ex-selected-muscles">${ex.muscleStr}</div>`:''}
          </div>
          <button class="chip" style="flex-shrink:0;font-size:12px;padding:8px 10px" onclick="openExPicker(${ei})">Wijzigen</button>`;
      } else if (ex._picking) {
        hdrHTML = `
          <div style="flex:1;font-size:14px;font-weight:700;color:var(--text)">Kies oefening</div>
          ${ex.name?`<button class="chip" style="flex-shrink:0;font-size:12px;padding:8px 10px" onclick="cancelPicker(${ei})">Annuleren</button>`:''}`;
      } else {
        hdrHTML = `
          <button class="btn btn-surface" style="flex:1;justify-content:flex-start;padding:10px 14px;font-size:14px;font-weight:600;gap:8px" onclick="openExPicker(${ei})">
            ${IC.search} Kies oefening…
          </button>`;
      }

      // ── Sets rows (only when exercise is selected and not picking) ──
      const setsHTML = (ex.name && !ex._picking) ? `
        <div class="set-header"><span></span><span>Reps</span><span>kg</span></div>
        ${ex.sets.map((s,si)=>`
          <div class="set-row">
            <span class="set-num">${si+1}</span>
            <input class="set-inp" type="number" inputmode="numeric" placeholder="—" value="${s.reps}" oninput="tF.exercises[${ei}].sets[${si}].reps=this.value">
            <input class="set-inp" type="number" inputmode="decimal" placeholder="—" value="${s.weight}" oninput="tF.exercises[${ei}].sets[${si}].weight=this.value">
          </div>`).join('')}
        <button class="add-set-btn" onclick="addSet(${ei})">+ Set toevoegen</button>` : '';

      return `
        <div class="ex-block">
          <div class="ex-hdr">
            ${hdrHTML}
            ${tF.exercises.length>1?`<button class="rm-ex-btn" onclick="rmEx(${ei})">${IC.trash}</button>`:''}
          </div>
          ${pickerHTML}
          ${setsHTML}
        </div>`;
    }).join('') + `<button class="add-ex-btn" onclick="addEx()">+ Oefening toevoegen</button>`;
  } else if (tF.type==='motocross') {
    specific = `<label class="lbl">Intensiteit</label><div class="chips">${
      ['low','medium','high'].map(i=>`<button class="chip${tF.intensity===i?' on':''}" style="${tF.intensity===i?'background:#DC2626;border-color:#DC2626':''}" onclick="setIntensity('${i}')">${i==='low'?'Laag':i==='medium'?'Gemiddeld':'Hoog'}</button>`).join('')
    }</div>`;
  } else {
    specific = `<label class="lbl">Activiteit</label><div class="chips">${
      [['run','Lopen'],['bike','Fietsen'],['swim','Zwemmen']].map(([k,l])=>
        `<button class="chip${tF.enduranceType===k?' on':''}" style="${tF.enduranceType===k?'background:#16A34A;border-color:#16A34A':''}" onclick="setET('${k}')">${l}</button>`).join('')
    }</div>
    <label class="lbl">Afstand (km)</label>
    <input class="inp" type="number" inputmode="decimal" placeholder="bijv. 10.5" value="${tF.distance}" oninput="tF.distance=this.value">`;
  }

  return `
    <label class="lbl">Datum</label>
    <input class="inp" type="date" value="${tF.date}" max="${todayStr()}" oninput="tF.date=this.value">
    <label class="lbl">Type training</label>
    <div class="chips" style="flex-wrap:nowrap">${typeChips}</div>
    <label class="lbl">Duur (minuten)</label>
    <input class="inp" type="number" inputmode="numeric" placeholder="bijv. 60" value="${tF.duration}" oninput="tF.duration=this.value">
    ${specific}
    <label class="lbl">Notities</label>
    <textarea class="inp" placeholder="Hoe voelde het?" oninput="tF.notes=this.value">${tF.notes}</textarea>
    <div style="margin-top:20px"><button class="btn btn-primary" onclick="saveTraining()">Opslaan</button></div>`;
}

const rebuildTForm = () => { document.getElementById('modal-body').innerHTML = buildTForm(); };
function setTType(t)    { tF.type=t;            rebuildTForm(); }
function setIntensity(i){ tF.intensity=i;        rebuildTForm(); }
function setET(t)       { tF.enduranceType=t;    rebuildTForm(); }
function addEx()        { tF.exercises.push(_mkEx()); rebuildTForm(); }
function rmEx(i)        { tF.exercises.splice(i,1); rebuildTForm(); }
function addSet(ei)     { tF.exercises[ei].sets.push({reps:'',weight:''}); rebuildTForm(); }

function saveTraining() {
  const entry = {
    id:uid(), timestamp:new Date().toISOString(), date:tF.date||todayStr(), type:tF.type,
    duration:tF.duration?parseInt(tF.duration):undefined,
    notes:tF.notes||undefined,
    exercises:tF.type==='strength'?tF.exercises.filter(e=>e.name.trim()).map(e=>({name:e.name,wgerId:e.wgerId,muscleStr:e.muscleStr,sets:e.sets})):undefined,
    intensity:tF.type==='motocross'?tF.intensity:undefined,
    enduranceType:tF.type==='endurance'?tF.enduranceType:undefined,
    distance:tF.type==='endurance'&&tF.distance?parseFloat(tF.distance):undefined,
  };
  db.push('training',entry); closeModal(); RENDERS.training(); toast('Training opgeslagen');
}

// ── wger exercise picker functions ──────────────────────
function openExPicker(ei) {
  tF.exercises[ei]._picking = true;
  rebuildTForm();
}
function cancelPicker(ei) {
  tF.exercises[ei]._picking = false;
  rebuildTForm();
}

async function fetchCatExercises(catId) {
  if (_wgerCache[catId] !== undefined) return;
  _wgerCache[catId] = []; // mark as loading to prevent duplicate calls
  try {
    const res  = await fetch(`${WGER_BASE}/exerciseinfo/?format=json&language=2&category=${catId}&limit=100`);
    const data = await res.json();
    _wgerCache[catId] = (data.results || [])
      .map(e => {
        const tr = e.translations.find(t => t.language === 2 || t.language?.id === 2);
        if (!tr?.name?.trim()) return null;
        const pri = (e.muscles          || []).map(m => m.name_en).filter(Boolean);
        const sec = (e.muscles_secondary|| []).map(m => m.name_en).filter(Boolean);
        return { id: e.id, name: tr.name.trim(), muscles: [...pri, ...sec.map(s=>s+'*')].join(' · ') };
      })
      .filter(Boolean)
      .sort((a,b) => a.name.localeCompare(b.name));
  } catch { _wgerCache[catId] = []; }
}

async function loadCatExercises(ei, catId) {
  tF.exercises[ei]._catId = catId;
  tF.exercises[ei]._filter = '';
  if (_wgerCache[catId]?.length > 0) {
    tF.exercises[ei]._catExercises = _wgerCache[catId];
    tF.exercises[ei]._loading = false;
    rebuildTForm();
    return;
  }
  tF.exercises[ei]._loading = true;
  tF.exercises[ei]._catExercises = [];
  rebuildTForm();
  await fetchCatExercises(catId);
  tF.exercises[ei]._loading = false;
  tF.exercises[ei]._catExercises = _wgerCache[catId] || [];
  rebuildTForm();
}

function rebuildExList(ei) {
  const ex  = tF.exercises[ei];
  const el  = document.getElementById(`ex-list-${ei}`);
  if (!el) return;
  const filtered = ex._filter
    ? ex._catExercises.filter(e => e.name.toLowerCase().includes(ex._filter))
    : ex._catExercises;
  el.innerHTML = filtered.map((e, xi) => `
    <div class="ex-pick-item" onclick="chooseExercise(${ei},${xi})">
      <div class="ex-pick-name">${e.name}</div>
      ${e.muscles?`<div class="ex-pick-muscles">${e.muscles}</div>`:''}
    </div>`).join('');
}

function chooseExercise(ei, xi) {
  // xi is index in the FILTERED list — look up in full list using current filter
  const ex  = tF.exercises[ei];
  const filtered = ex._filter
    ? ex._catExercises.filter(e => e.name.toLowerCase().includes(ex._filter))
    : ex._catExercises;
  const chosen = filtered[xi];
  if (!chosen) return;
  ex.name      = chosen.name;
  ex.wgerId    = chosen.id;
  ex.muscleStr = chosen.muscles;
  ex._picking  = false;
  ex._filter   = '';
  rebuildTForm();
}

function useCustomEx(ei) {
  const name = document.getElementById(`custom-ex-${ei}`)?.value?.trim();
  if (!name) { toast('Vul een naam in'); return; }
  tF.exercises[ei].name      = name;
  tF.exercises[ei].wgerId    = null;
  tF.exercises[ei].muscleStr = '';
  tF.exercises[ei]._picking  = false;
  rebuildTForm();
}

let _exSearchTimer = null;

function exSearchInput(ei, val) {
  tF.exercises[ei]._sq = val.trim();
  tF.exercises[ei]._sr = [];
  clearTimeout(_exSearchTimer);
  if (!val.trim()) {
    tF.exercises[ei]._sl = false;
    updateExSearchArea(ei);
    return;
  }
  tF.exercises[ei]._sl = true;
  updateExSearchArea(ei);
  _exSearchTimer = setTimeout(() => doExSearch(ei, val.trim().toLowerCase()), 400);
}

async function doExSearch(ei, query) {
  // Load all uncached categories in parallel
  await Promise.all(WGER_CATS.filter(c => _wgerCache[c.id] === undefined).map(c => fetchCatExercises(c.id)));
  // Guard: query may have changed while we were loading
  if (tF.exercises[ei]._sq.toLowerCase() !== query) return;
  const seen = new Set();
  const results = [];
  for (const cat of WGER_CATS) {
    for (const ex of (_wgerCache[cat.id] || [])) {
      if (!seen.has(ex.id) && ex.name.toLowerCase().includes(query)) {
        seen.add(ex.id); results.push(ex);
      }
    }
  }
  tF.exercises[ei]._sr = results;
  tF.exercises[ei]._sl = false;
  updateExSearchArea(ei);
}

function updateExSearchArea(ei) {
  const el = document.getElementById(`ex-sr-${ei}`);
  if (!el) { rebuildTForm(); return; }
  const ex = tF.exercises[ei];
  if (!ex._sq) { el.innerHTML = ''; return; }
  if (ex._sl)  { el.innerHTML = `<div class="db-msg">Zoeken in alle oefeningen…</div>`; return; }
  if (!ex._sr.length) { el.innerHTML = `<div class="db-msg">Geen resultaten voor "<b>${ex._sq}</b>"</div>`; return; }
  el.innerHTML = `<div class="ex-pick-wrap">
    ${ex._sr.map((e,xi) => `
      <div class="ex-pick-item" onclick="chooseFromSearch(${ei},${xi})">
        <div class="ex-pick-name">${e.name}</div>
        ${e.muscles?`<div class="ex-pick-muscles">${e.muscles}</div>`:''}
      </div>`).join('')}
  </div>`;
}

function chooseFromSearch(ei, xi) {
  const chosen = tF.exercises[ei]._sr[xi];
  if (!chosen) return;
  const ex = tF.exercises[ei];
  ex.name = chosen.name; ex.wgerId = chosen.id; ex.muscleStr = chosen.muscles;
  ex._picking = false; ex._sq = ''; ex._sr = [];
  rebuildTForm();
}

      </div>`;
  } else {
    const dur = isTime(sF.bedtime)&&isTime(sF.wakeTime) ? calcDuration(sF.bedtime,sF.wakeTime) : null;
    const qBtns = [1,2,3,4,5].map(q =>
      `<button class="q-btn${sF.quality===q?' on':''}" style="${sF.quality===q?`background:${QUALITY_COLORS[q]};border-color:${QUALITY_COLORS[q]}`:''}" onclick="setQ(${q})">${q}</button>`
    ).join('');
    html += `
      <div class="card" style="animation:slide-up 260ms var(--ease-out)">
        <div class="card-label">${sF.editing?'Bewerken':'Slaap loggen'}</div>
        <label class="lbl">Slaaptijd (UU:MM)</label>
        <input class="inp" id="inp-bed" value="${sF.bedtime}" placeholder="22:30" maxlength="5" oninput="sF.bedtime=this.value;updDur()">
        <label class="lbl">Wektijd (UU:MM)</label>
        <input class="inp" id="inp-wake" value="${sF.wakeTime}" placeholder="06:30" maxlength="5" oninput="sF.wakeTime=this.value;updDur()">
        ${dur&&dur>0?`<div class="dur-preview">${IC.moon} ${dur.toFixed(1)} uur slaap</div>`:'<div id="dur-ph"></div>'}
        <label class="lbl">Slaapkwaliteit</label>
        <div class="q-row">${qBtns}</div>
        <div class="q-label">${QUALITY_LABELS[sF.quality]}</div>
        <div class="btn-row" style="margin-top:20px">
          ${sF.editing?`<button class="btn btn-surface" onclick="cancelEdit()">Annuleren</button>`:'<div></div>'}
          <button class="btn btn-primary" onclick="saveSleep()">Opslaan</button>
        </div>
      </div>`;
  }

  if (history.length>0) {
    html += `<div class="section-title">Geschiedenis</div>`;
    html += history.map((s,i) => `
      <div class="h-row" style="animation-delay:${i*40}ms">
        <div><div class="h-date">${s.date}</div><div class="h-time">${s.bedtime} → ${s.wakeTime}</div></div>
        <div class="h-right"><div class="h-dur">${s.duration.toFixed(1)}u</div><div class="q-dot" style="background:${QUALITY_COLORS[s.quality]}"></div></div>
      </div>`).join('');
  }

  document.getElementById('sleep-content').innerHTML = html;
};

function setQ(q) { sF.quality=q; RENDERS.sleep(); }
function startEditSleep() { sF.editing=true; RENDERS.sleep(); }
function cancelEdit() { sF.editing=false; RENDERS.sleep(); }

function updDur() {
  const b=document.getElementById('inp-bed')?.value;
  const w=document.getElementById('inp-wake')?.value;
  const ph=document.getElementById('dur-ph');
  if (!ph) return;
  if (b&&w&&isTime(b)&&isTime(w)) {
    const d=calcDuration(b,w);
    ph.outerHTML=`<div class="dur-preview" id="dur-ph">${IC.moon} ${d.toFixed(1)} uur slaap</div>`;
  }
}

function saveSleep() {
  const b=document.getElementById('inp-bed')?.value||sF.bedtime;
  const w=document.getElementById('inp-wake')?.value||sF.wakeTime;
  if (!isTime(b)||!isTime(w)) { toast('Gebruik UU:MM formaat'); return; }
  const dur=calcDuration(b,w);
  if (dur<=0||dur>16) { toast('Controleer de tijden'); return; }
  const arr=db.getArr('sleep').filter(s=>s.date!==todayStr());
  arr.unshift({id:uid(),date:todayStr(),bedtime:b,wakeTime:w,duration:dur,quality:sF.quality});
  db.set('sleep',arr); sF.editing=false; RENDERS.sleep(); toast('Slaap opgeslagen');
}

        </p>
        <button class="btn btn-primary" onclick="signInWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66 2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Inloggen met Google
        </button>
      `}
    </div>

    <div class="card" style="animation:slide-up 260ms 40ms var(--ease-out) both">
      <div class="card-label">Firebase sync</div>
      <div class="s-row">
        <span>Status</span>
        <span style="display:flex;align-items:center;gap:6px">
          <span style="width:8px;height:8px;border-radius:50%;background:${user ? 'var(--green)' : 'var(--subtle)'};display:inline-block"></span>
          ${user
            ? (lastSync
                ? `Gesync om ${new Date(lastSync).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`
                : 'Verbonden')
            : 'Niet ingelogd'}

      </div>
      ${user ? `<button class="btn btn-surface" style="margin-top:10px" onclick="fbPush().then(()=>RENDERS.settings())">Nu synchroniseren</button>` : ''}
    </div>

    <div class="card" style="animation:slide-up 260ms 80ms var(--ease-out) both">
      <div class="card-label">Groq API-key</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5">
        Haal je gratis sleutel op via
        <a href="https://console.groq.com/keys" target="_blank">console.groq.com</a>
        — gratis, geen creditcard nodig
      </p>
      <input class="inp" id="inp-key" type="password" placeholder="gsk_…" value="${apiKey}">
      ${apiKey?`<p style="margin-top:10px;font-size:13px;color:var(--green);font-weight:600">API-key is ingesteld</p>`:''}
      <button class="btn btn-primary" style="margin-top:14px" onclick="saveSettings()">Opslaan</button>
    </div>

    <div class="card" style="animation:slide-up 260ms 120ms var(--ease-out) both">
      <div class="card-label">Toevoegen aan beginscherm</div>
      <p style="font-size:13px;color:var(--muted);line-height:1.65">
        Open in <strong>Safari</strong> → tik op het deel-icoon → kies <strong>"Zet op beginscherm"</strong>
      </p>
    </div>

    <div class="card" style="animation:slide-up 260ms 160ms var(--ease-out) both">
      <div class="card-label">Opgeslagen data</div>
      <div class="s-row"><span>Maaltijden</span><span>${db.getArr('food').length}</span></div>
      <div class="s-row"><span>Trainingen</span><span>${db.getArr('training').length}</span></div>
      <div class="s-row"><span>Slaapdagen</span><span>${db.getArr('sleep').length}</span></div>
      <button class="btn btn-danger" style="margin-top:14px" onclick="clearAll()">Alle data wissen</button>
    </div>`;
};

function saveSettings() {
  db.set('settings',{
    apiKey: document.getElementById('inp-key').value.trim(),
  });
  RENDERS.settings(); toast('Opgeslagen');
}
function clearAll() {
  if (!confirm('Alle data wissen? Dit kan niet ongedaan worden gemaakt.')) return;
  ['food','training','sleep'].forEach(k=>db.set(k,[]));
  dashAdvice=''; RENDERS.settings(); toast('Data gewist');
}
